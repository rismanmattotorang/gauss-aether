[package]
name        = "gauss-memory"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Trinity Memory Substrate — SurrealDB-backed append log + FTS + HNSW + graph lineage."

[lints]
workspace = true

[features]
default = ["surrealdb-embedded"]
# Enable the embedded SurrealDB engine (kv-mem for tests; surrealkv for
# single-node persistent storage; rocksdb is an additive Phase-10 feature).
surrealdb-embedded = ["dep:surrealdb"]
kv-surrealkv = ["surrealdb-embedded", "surrealdb/kv-surrealkv"]
kv-rocksdb   = ["surrealdb-embedded", "surrealdb/kv-rocksdb"]

[dependencies]
gauss-core   = { workspace = true }
gauss-traits = { workspace = true }
async-trait  = { workspace = true }
blake3       = { workspace = true }
parking_lot  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
sha2         = { workspace = true }
thiserror    = { workspace = true }
tokio        = { workspace = true }
tracing      = { workspace = true }

surrealdb    = { workspace = true, optional = true }

[dev-dependencies]
tokio   = { version = "1", features = ["macros", "rt-multi-thread"] }
futures = { workspace = true }
