[package]
name        = "gauss-cron"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Cron scheduler — 60-second tick driver with grammar parsing for in-agent scheduled jobs."

[lints]
workspace = true

[dependencies]
gauss-core  = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
time        = { workspace = true, features = ["parsing"] }
tokio       = { workspace = true, features = ["sync", "time", "rt", "fs", "io-util"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros", "rt", "rt-multi-thread"] }
