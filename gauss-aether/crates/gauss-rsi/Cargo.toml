[package]
name        = "gauss-rsi"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Gauss-Agent0 weight-frozen recursive self-improvement engine — state operator Φ, productivity/convergence theory, SAHOO drift gate, LinUCB router, and DualRAG fusion."

[lints]
workspace = true

[features]
default = ["async"]
# The async live-backend surface (`AsyncExpert`, `AsyncKnowledgeStore`,
# `AsyncRsiEngine`). The deterministic sync core builds without it.
async = ["dep:async-trait"]

[dependencies]
gauss-core   = { workspace = true }
serde        = { workspace = true }
thiserror    = { workspace = true }
async-trait  = { workspace = true, optional = true }

[dev-dependencies]
serde_json   = { workspace = true }
tokio        = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
