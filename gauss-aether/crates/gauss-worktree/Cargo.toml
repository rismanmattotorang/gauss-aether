[package]
name        = "gauss-worktree"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Per-session git-worktree isolation for concurrent agent runs. Cap-gated + audit-aware."

[lints]
workspace = true

[dependencies]
gauss-core  = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["fs", "process", "rt", "macros"] }
tracing     = { workspace = true }

[dev-dependencies]
tokio    = { workspace = true, features = ["test-util", "macros", "rt", "rt-multi-thread", "fs", "process"] }
tempfile = { workspace = true }
