[package]
name        = "gauss-sop"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Standard Operating Procedure engine — trigger → approval → workflow → receipt, cap-gated and Merkle-chained (Sprint 14 §1)."

[lints]
workspace = true

[dependencies]
gauss-core  = { workspace = true }
async-trait = { workspace = true }
blake3      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["sync", "rt", "macros"] }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros", "rt", "rt-multi-thread"] }
