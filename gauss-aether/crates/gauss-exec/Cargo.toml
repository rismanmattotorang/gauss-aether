[package]
name        = "gauss-exec"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Session executor abstraction — local / docker / ssh / modal backends, cap-gated per-backend."

[lints]
workspace = true

[dependencies]
gauss-core  = { workspace = true }
async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
tokio       = { workspace = true, features = ["process", "io-util", "rt", "macros"] }
tracing     = { workspace = true }

[dev-dependencies]
tokio    = { workspace = true, features = ["test-util", "macros", "rt", "rt-multi-thread", "process", "fs"] }
tempfile = { workspace = true }
