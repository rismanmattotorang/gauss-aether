[workspace]
resolver = "2"
members = [
    "crates/gauss-core",
    "crates/gauss-kernel",
    "crates/gauss-turn",
    "crates/gauss-memory",
    "crates/gauss-audit",
    "crates/gauss-conformance",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.83"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/rismanmattotorang/gauss-aether"
authors = ["Gauss-Aether Contributors"]

[workspace.dependencies]
# Internal crates (path deps for the local workspace)
gauss-core      = { path = "crates/gauss-core",      version = "0.0.1" }
gauss-kernel    = { path = "crates/gauss-kernel",    version = "0.0.1" }
gauss-turn      = { path = "crates/gauss-turn",      version = "0.0.1" }
gauss-memory    = { path = "crates/gauss-memory",    version = "0.0.1" }
gauss-audit     = { path = "crates/gauss-audit",     version = "0.0.1" }

# Error handling
thiserror = "2"

# Serialization
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Concurrency primitives
parking_lot = "0.12"

# Time / monotonic clocks
# (kept narrow on purpose to limit Phase-0 dep surface)

# Logging / tracing
tracing            = { version = "0.1", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter"] }

# Hashing (chain link + record digest); deferred to gauss-audit
blake3 = "1"
sha2   = "0.10"

# Test-only
proptest = "1"

[workspace.lints.rust]
unsafe_code              = "forbid"
missing_docs             = "warn"
rust_2018_idioms         = { level = "warn", priority = -1 }
unreachable_pub          = "warn"
unused_must_use          = "deny"
single_use_lifetimes     = "warn"

[workspace.lints.clippy]
all                       = { level = "warn", priority = -1 }
pedantic                  = { level = "warn", priority = -1 }
nursery                   = { level = "warn", priority = -1 }
module_name_repetitions   = "allow"
missing_errors_doc        = "allow"
missing_panics_doc        = "allow"
must_use_candidate        = "allow"

# Strict overrides for high-performance kernel correctness:
mem_forget                = "deny"
arithmetic_side_effects   = "warn"
todo                      = "warn"
dbg_macro                 = "deny"
print_stdout              = "warn"
print_stderr              = "warn"

[profile.release]
codegen-units = 1
lto           = "thin"
strip         = "symbols"
panic         = "abort"

[profile.bench]
codegen-units = 1
lto           = "thin"
debug         = true
