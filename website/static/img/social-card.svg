<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050a14"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="80" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" stroke="#94a3b8" stroke-opacity="0.06" stroke-width="1" fill="none"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(100,80) scale(2.6)">
    <path d="M32 4 L56 18 L56 40 C56 49 48 56 32 60 C16 56 8 49 8 40 L8 18 Z"
          stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" fill="none"/>
    <circle cx="32" cy="32" r="3.4" fill="url(#accent)"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="350" font-family="Inter, system-ui, sans-serif" font-size="96"
        font-weight="750" letter-spacing="-3" fill="#f1f5f9">GaussClaw</text>
  <text x="100" y="420" font-family="Inter, system-ui, sans-serif" font-size="36"
        font-weight="500" fill="#67e8f9">The verifiable AI agent.</text>
  <text x="100" y="475" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="400" fill="#94a3b8">Built in Rust · Proven safe by construction</text>

  <!-- Footer label -->
  <rect x="100" y="540" width="190" height="34" rx="6" fill="none" stroke="#22d3ee" stroke-opacity="0.55"/>
  <text x="115" y="563" font-family="JetBrains Mono, monospace" font-size="16"
        fill="#67e8f9">$ gaussclaw doctor</text>
</svg>
