[package]
name        = "gaussclaw-tools"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "First-party HWCA-lifted tools (echo, json_get, upper, file_read) + ToolRegistry."

[lints]
workspace = true

[dependencies]
gauss-core      = { workspace = true }
gauss-traits    = { workspace = true }
gauss-hwca      = { workspace = true }
gauss-sandbox   = { workspace = true }
gaussclaw-skill = { workspace = true }
async-trait     = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
thiserror       = { workspace = true }
tokio           = { workspace = true, features = ["fs", "process"] }
blake3          = { workspace = true }
sha2            = { workspace = true }
base64          = { workspace = true }
regex           = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "macros"] }
