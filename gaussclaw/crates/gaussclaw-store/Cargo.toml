[package]
name        = "gaussclaw-store"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Hermes session and lineage schema atop the SurrealDB Trinity + receipt chain substrate."

[lints]
workspace = true

[dependencies]
gauss-core   = { workspace = true }
gauss-traits = { workspace = true }
gauss-memory = { workspace = true }
gauss-audit  = { workspace = true }
gauss-cron   = { workspace = true }
async-trait  = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
blake3       = { workspace = true }
thiserror    = { workspace = true }
time         = { workspace = true }
tokio        = { workspace = true, features = ["sync", "fs", "io-util"] }
tracing      = { workspace = true }

[dev-dependencies]
tokio          = { workspace = true, features = ["test-util", "macros"] }
ed25519-dalek  = { workspace = true }
