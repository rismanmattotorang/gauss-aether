[package]
name        = "gaussclaw-plugins"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Plugin loader — Hermes-parity 5-kind discovery + cap-gated registration."

[lints]
workspace = true

[dependencies]
gauss-core       = { workspace = true }
gaussclaw-skill  = { workspace = true }
async-trait      = { workspace = true }
serde            = { workspace = true }
serde_json       = { workspace = true }
thiserror        = { workspace = true }
toml             = { workspace = true }
tokio            = { workspace = true, features = ["fs", "rt", "macros"] }
tracing          = { workspace = true }
directories      = { workspace = true }
blake3           = { workspace = true }

[dev-dependencies]
tokio    = { workspace = true, features = ["test-util", "macros", "rt", "rt-multi-thread", "fs"] }
tempfile = { workspace = true }
