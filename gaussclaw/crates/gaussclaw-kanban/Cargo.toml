[package]
name        = "gaussclaw-kanban"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Opt-in Kanban board — typed CRUD + cap-gated write tool. Hermes parity (lower priority)."

[lints]
workspace = true

[dependencies]
