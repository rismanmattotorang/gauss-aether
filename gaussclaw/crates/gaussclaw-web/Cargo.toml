[package]
name        = "gaussclaw-web"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description = "Axum dashboard backend with embedded React 19 + Vite + Tailwind frontend."

[lints]
workspace = true

[dependencies]
gauss-core       = { workspace = true }
gauss-cron       = { workspace = true }
gaussclaw-plugins = { workspace = true }
gaussclaw-agent  = { workspace = true }
gaussclaw-config = { workspace = true }
gaussclaw-export = { workspace = true }
gaussclaw-skill  = { workspace = true }
gaussclaw-store  = { workspace = true }
gaussclaw-tools  = { workspace = true }
gaussclaw-api-modes = { workspace = true }
anyhow           = { workspace = true }
axum             = { workspace = true }
tokio            = { workspace = true }
tower            = { workspace = true }
tower-http       = { workspace = true }
rust-embed       = { workspace = true }
mime_guess       = { workspace = true }
serde            = { workspace = true }
serde_json       = { workspace = true }
tracing          = { workspace = true }
futures-util     = { workspace = true }
async-trait      = { workspace = true }

[dev-dependencies]
tokio           = { workspace = true, features = ["test-util", "macros", "fs"] }
gaussclaw-store = { workspace = true }
gauss-core      = { workspace = true }
gauss-hooks     = { workspace = true }
tempfile        = { workspace = true }
