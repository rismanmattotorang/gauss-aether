# cargo-deny configuration for Gauss-Aether.
# Enforces licence policy, advisory monitoring, and source-allow-list across
# the workspace. Phase 0 wires this into CI; phases tighten it as needed.

[graph]
all-features = false

[advisories]
yanked    = "deny"
ignore    = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
