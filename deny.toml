# cargo-deny configuration for Gauss-Aether.
# Enforces licence policy, advisory monitoring, and source-allow-list across
# the workspace. Phase 0 wires this into CI; phases tighten it as needed.

[graph]
all-features = false

[advisories]
yanked    = "deny"
ignore    = [
  # paste 1.0.15 — author archived the crate; pulled in transitively
  # via ratatui → gaussclaw-tui. No safe upgrade exists yet (pastey
  # is the suggested fork but ratatui hasn't switched). Re-evaluate
  # when ratatui drops the dependency or migrates to `pastey`.
  "RUSTSEC-2024-0436",
  # bincode 1.3.3 — pulled in transitively via surrealdb-core. Author
  # released bincode 2.x with a different API and marked 1.x
  # unmaintained. Upgrading requires SurrealDB to switch, which is
  # out of our control. Re-evaluate when surrealdb cuts a release
  # using bincode 2.
  "RUSTSEC-2025-0141",
  # lru 0.12.5 — unsound `IterMut` invariant; pulled via surrealdb-
  # core's quick_cache. We never use `IterMut` directly. Same
  # upstream-blocked-by-SurrealDB situation as above.
  "RUSTSEC-2026-0002",
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  # MPL-2.0 is weak-copyleft and only requires source disclosure of
  # modifications to the MPL-licensed files themselves — not of the
  # binary that links them. Pulled in transitively via axum's HTML
  # toolchain (cssparser, dtoa-short, option-ext, cssparser-macros).
  "MPL-2.0",
  # The Unlicense and MIT-0 are public-domain-equivalent permissive
  # licences with no attribution requirement. Pulled in via
  # async_io_stream / pharos / ws_stream_wasm / ext-sort / borrow-or-share.
  "Unlicense",
  "MIT-0",
  # SurrealDB ships under BSL-1.1; this is the SPECS-mandated
  # Trinity backend (gauss-memory), so it's a deliberate dependency.
  "BUSL-1.1",
]
confidence-threshold = 0.93

# SurrealDB declares its licence via a top-level LICENSE file rather
# than a `license =` field in Cargo.toml, so cargo-deny can't
# auto-detect it. Clarify explicitly that the file is the BUSL-1.1
# text.
[[licenses.clarify]]
name       = "surrealdb"
expression = "BUSL-1.1"
license-files = []

[[licenses.clarify]]
name       = "surrealdb-core"
expression = "BUSL-1.1"
license-files = []

[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
